name: My First Pipeline

# 1. When should this run?
on: [push]

# 2. What should it do?
jobs:
  build-and-test:
    runs-on: ubuntu-latest # The type of robot/machine to use

    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # This copies your code to the robot

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install -r requirements.txt || echo "No requirements found"

      - name: Run my App
        run: python hello.py