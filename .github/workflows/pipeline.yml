name: Flask Build and Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Pull the code from GitHub onto the runner
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Install the exact Python version your teammate is using
      - name: Set up Python 3.13
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'

      # 3. Install the "Ingredients" (The list you just sent me)
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4. Linting (Optional but recommended)
      # This checks if the code has obvious syntax errors
      - name: Check Syntax
        run: python -m compileall .

      # 5. The "Smoke Test"
      # This starts the Flask app, waits 5 seconds, then shuts it down.
      # If it crashes in those 5 seconds, the pipeline fails.
      - name: Verify App Starts
        run: |
          python app.py & 
          sleep 5
          kill $! || echo "App already closed or failed to start"