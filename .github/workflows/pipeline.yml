name: Flask Build and Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Pull the code from GitHub onto the runner
      - name: Checkout repository
        uses: actions/checkout@v5

      # 2. Install the exact Python version (3.13)
      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      # 3. Install the dependencies from your requirements.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      # 4. Check for syntax errors across all files
      - name: Check Syntax
        run: python -m compileall .

      # 5. The "Smoke Test"
      # Starts the app in the background (&), waits 5 seconds, 
      # then shuts it down. If it crashes during boot, the job fails.
      - name: Verify App Starts
        run: |
          python app.py & 
          sleep 5
          kill $! || echo "App already closed or failed to start"